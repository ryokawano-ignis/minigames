<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミニゲームコレクション</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(2px 2px at 20% 90%, rgba(180,180,255,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 30%, rgba(180,180,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 45%, rgba(180,180,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 55%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 95%, rgba(180,180,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 5%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 88%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    .title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a78bfa, transparent);
      margin: 20px auto 0;
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .game-card {
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 16px;
      padding: 28px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.25s ease;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: inherit;
    }

    .game-card:hover {
      border-color: rgba(167, 139, 250, 0.5);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(167, 139, 250, 0.15);
    }

    .game-card:hover::before { opacity: 1; }

    .game-card:active { transform: translateY(-2px); }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, rgba(167,139,250,0.3), rgba(96,165,250,0.2));
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #e0e0ff;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-play {
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .badge-soon {
      background: rgba(107, 114, 128, 0.15);
      color: #6b7280;
      border: 1px solid rgba(107, 114, 128, 0.3);
    }

    /* Coming soon card */
    .game-card.coming-soon {
      cursor: default;
      opacity: 0.6;
    }

    .game-card.coming-soon:hover {
      transform: none;
      box-shadow: none;
      border-color: rgba(167, 139, 250, 0.2);
    }

    .game-card.coming-soon:hover::before { opacity: 0; }

    .card-arrow {
      position: absolute;
      top: 28px;
      right: 28px;
      color: #4b5563;
      font-size: 1.2rem;
      transition: all 0.25s ease;
    }

    .game-card:not(.coming-soon):hover .card-arrow {
      color: #a78bfa;
      transform: translate(2px, -2px);
    }

    footer {
      text-align: center;
      margin-top: 80px;
      color: #374151;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="title">ミニゲームコレクション</h1>
      <p class="subtitle">Mini Game Collection</p>
      <div class="divider"></div>
    </header>

    <p class="section-label">ゲーム一覧</p>

    <div class="games-grid">

      <a href="falling-puzzle.html" class="game-card">
        <span class="card-arrow">↗</span>
        <div class="card-icon">🎮</div>
        <h2 class="card-title">落ちものカラーパズル</h2>
        <p class="card-desc">同じ色のブロックを4つ以上つなげて消そう。チェーンで高得点を狙え！</p>
        <span class="card-badge badge-play">▶ プレイ</span>
      </a>

      <div class="game-card coming-soon">
        <span class="card-arrow">○</span>
        <div class="card-icon" style="background: linear-gradient(135deg, rgba(107,114,128,0.2), rgba(75,85,99,0.15));">🔒</div>
        <h2 class="card-title">近日公開</h2>
        <p class="card-desc">次のゲームを準備中です。お楽しみに！</p>
        <span class="card-badge badge-soon">Coming Soon</span>
      </div>

      <div class="game-card coming-soon">
        <span class="card-arrow">○</span>
        <div class="card-icon" style="background: linear-gradient(135deg, rgba(107,114,128,0.2), rgba(75,85,99,0.15));">🔒</div>
        <h2 class="card-title">近日公開</h2>
        <p class="card-desc">次のゲームを準備中です。お楽しみに！</p>
        <span class="card-badge badge-soon">Coming Soon</span>
      </div>

    </div>

    <footer>
      <p>© 2026 ミニゲームコレクション</p>
    </footer>
  </div>
</body>
</html>
